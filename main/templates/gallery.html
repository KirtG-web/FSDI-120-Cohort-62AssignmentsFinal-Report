{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}

<section class="page-section">

    <!-- ONE MAIN GALLERY CARD -->
    <div class="gallery-main-card">

        <!-- TITLE NOW INSIDE CARD -->
        <h2 class="gallery-title">{% trans "Gallery" %}</h2>

        <div class="gallery-images">

            <div class="gallery-item">
                <h3 class="card-title">{% trans "Traditional Attire" %}</h3>
                <img src="{% static 'images/clothing_image.jpg' %}" alt="{% trans 'Traditional Attire' %}">
            </div>

            <div class="gallery-item">
                <h3 class="card-title">{% trans "Folk Dance Costumes" %}</h3>
                <img src="{% static 'images/download (2).jpg' %}" alt="{% trans 'Folk Dance Costumes' %}">
            </div>

            <div class="gallery-item">
                <h3 class="card-title">{% trans "Family Traditions" %}</h3>
                <img src="{% static 'images/images (2).jpg' %}" alt="{% trans 'Family Traditions' %}">
            </div>

            <div class="gallery-item">
                <h3 class="card-title">{% trans "Regional Costumes" %}</h3>
                <img src="{% static 'images/traditional_costumes.jpg' %}" alt="{% trans 'Regional Costumes' %}">
            </div>

        </div>

    </div>

</section>

{% endblock %}
